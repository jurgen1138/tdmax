name: Update GA4 Report

on:
  schedule:
    # Every Monday at 9am Costa Rica time (UTC-6 → 15:00 UTC)
    - cron: '0 15 * * 1'
  workflow_dispatch: # allow manual run from GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: reportes/package.json

      - name: Install dependencies
        run: npm install --prefix reportes

      - name: Generate report
        run: node reportes/generate.mjs
        env:
          GA4_PROPERTY_ID:      ${{ secrets.GA4_PROPERTY_ID }}
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GA4_CTA_PARAM:        button_text
          REPORT_PASSWORD_HASH: ${{ secrets.REPORT_PASSWORD_HASH }}

      - name: Commit if report changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reportes/index.html
          git diff --cached --quiet || git commit -m "chore: update GA4 report $(date -u +%Y-%m-%d)" && git push
